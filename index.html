    <link href="https://fonts.googleapis.com/css2?family=Noto+Kufi+Arabic:wght@400;500;600;700;800&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-ku: 'Noto Kufi Arabic', sans-serif;
            --font-en: 'Outfit', sans-serif;
        }
        body {
            font-family: var(--font-ku);
            background-color: #f3f4f6;
        }
        html[lang="en"] body {
            font-family: var(--font-en);
        }
        /* شاردنەوەی سکڕۆڵبار بۆ بەشی جۆرەکان بەڵام هێشتنەوەی توانای سکڕۆڵکردن */
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }
        
        /* ئەنیمەیشنی هاتنەسەرەوە بۆ پەنجەرەی داواکارییەکان */
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up {
            animation: slideUp 0.3s ease-out forwards;
        }
    </style>
</head>

            { id: 78, name: {ku: 'ئەڤۆکادۆ', ar: 'أفوكادو', en: 'Avocado'}, description: {ku: 'سموزی ئەڤۆکادۆی تەندروست', ar: 'سموثي أفوكادو صحي', en: 'Healthy avocado smoothie'}, price: '3,000', category: 'smoothies', image: 'images/freepik__avocado-smoothie-a-tall-glass-of-thick-creamy-pale__64251.png' },

            // Soft Drinks & Water
            { id: 79, name: {ku: 'ئاو', ar: 'ماء', en: 'Water'}, description: {ku: 'ئاوی کانزایی پاک', ar: 'مياه معدنية نقية', en: 'Pure mineral water'}, price: '250', category: 'soft_drinks', image: 'images/freepik__water-a-clean-cold-plastic-or-glass-bottle-of-mine__64252.png' },
            { id: 80, name: {ku: 'تایگەر', ar: 'تايجر', en: 'Tiger'}, description: {ku: 'خواردنەوەی وزەبەخشی تایگەر', ar: 'مشروب طاقة تايجر', en: 'Tiger energy drink'}, price: '2,000', category: 'soft_drinks', image: 'images/freepik__tiger-energy-drink-a-cold-can-of-tiger-energy-drin__64253.png' },
            { id: 81, name: {ku: 'ڕێد بۆڵ', ar: 'ريدبول', en: 'Red Bull'}, description: {ku: 'خواردنەوەی وزەبەخشی ڕێد بۆڵ', ar: 'مشروب طاقة ريدبول', en: 'Red Bull energy drink'}, price: '3,000', category: 'soft_drinks', image: 'images/freepik__red-bull-a-cold-can-of-red-bull-energy-drink-with-__64254.png' },
            { id: 82, name: {ku: 'کۆلا', ar: 'كولا', en: 'Cola'}, description: {ku: 'خواردنەوەی گازی', ar: 'مشروب غازي', en: 'Soft drink'}, price: '1,000', category: 'soft_drinks', image: 'images/freepik__cola-a-tall-glass-filled-with-dark-cola-and-ice-cu__64255.png' },
            { id: 83, name: {ku: 'سپرایت', ar: 'سبرايت', en: 'Sprite'}, description: {ku: 'خواردنەوەی گازی', ar: 'مشروب غازي', en: 'Soft drink'}, price: '1,000', category: 'soft_drinks', image: 'images/freepik__sprite-a-tall-glass-filled-with-clear-sprite-soda-__64256.png' }
        ];

        // جۆرەکان (Categories)
        const categories = [
            { id: 'all', name: {ku: 'هەمووی', ar: 'الكل', en: 'All'} },
            { id: 'hot_drinks', name: {ku: 'گەرمەکان', ar: 'مشروبات ساخنة', en: 'Hot Drinks'} },
            { id: 'cold_drinks', name: {ku: 'ساردەکان', ar: 'مشروبات باردة', en: 'Cold Drinks'} },
            { id: 'mojitos', name: {ku: 'مۆکتیلەکان', ar: 'موهيتو', en: 'Mojitos'} },
            { id: 'fresh_juices', name: {ku: 'شەربەتی فرێش', ar: 'عصائر طازجة', en: 'Fresh Juices'} },
            { id: 'smoothies', name: {ku: 'سموزی', ar: 'سموثي', en: 'Smoothies'} },
            { id: 'cakes', name: {ku: 'کێک و شیرینی', ar: 'كيك وحلويات', en: 'Cakes'} },
            { id: 'pancakes', name: {ku: 'پەنکەیک', ar: 'بان كيك', en: 'Pancakes'} },
            { id: 'crepes', name: {ku: 'کرێپ', ar: 'كريب', en: 'Crepes'} },
            { id: 'waffles', name: {ku: 'وافل', ar: 'وافل', en: 'Waffles'} },
            { id: 'soft_drinks', name: {ku: 'گازی و ئاو', ar: 'غازيات وماء', en: 'Soft Drinks'} }
        ];

        let currentLang = 'ku';
        let currentCategory = 'all';
        let searchQuery = '';
        let cart = [];

        // وەرگرتنی ئيڵێمێنتەکانی ناو HTML
        const categoryTabsContainer = document.getElementById('categoryTabs');
        const menuContainer = document.getElementById('menuContainer');
        const searchInput = document.getElementById('searchInput');
        const searchIcon = document.getElementById('searchIcon');

        // نەخشەی گۆڕینی زمان (Language Switcher)
        function setLanguage(lang) {
            currentLang = lang;
            
            // گۆڕینی ئاراستەی لاپەڕە (RTL/LTR)
            document.documentElement.lang = lang;
            document.documentElement.dir = (lang === 'en') ? 'ltr' : 'rtl';

            // نوێکردنەوەی ستایلی دوگمەکانی زمان
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('bg-white', 'text-orange-500', 'shadow-sm');
                btn.classList.add('text-gray-500');
            });
            const activeBtn = document.getElementById(`btn-lang-${lang}`);
            activeBtn.classList.remove('text-gray-500');
            activeBtn.classList.add('bg-white', 'text-orange-500', 'shadow-sm');

            // نوێکردنەوەی دەقەکانی ڕووکار
            searchInput.placeholder = uiTranslations[lang].searchPlaceholder;
            document.getElementById('cartTitle').innerText = uiTranslations[lang].cartTitle;
            document.getElementById('cartSubtitle').innerText = uiTranslations[lang].cartSubtitle;
            document.getElementById('cartTotalLabel').innerText = uiTranslations[lang].total;

            // گونجاندنی ئایکۆنی گەڕان بۆ RTL/LTR
            if (lang === 'en') {
                searchInput.classList.remove('pr-11', 'pl-4');
                searchInput.classList.add('pl-11', 'pr-4');
                searchIcon.classList.remove('right-4');
                searchIcon.classList.add('left-4');
            } else {
                searchInput.classList.remove('pl-11', 'pr-4');
                searchInput.classList.add('pr-11', 'pl-4');
                searchIcon.classList.remove('left-4');
                searchIcon.classList.add('right-4');
            }

            // دووبارە ڕێندەرکردنەوە
            renderCategories();
            renderMenuItems();
            updateCartUI();
        }

        // نەخشەی دروستکردنی دوگمەی جۆرەکان
        function renderCategories() {
            categoryTabsContainer.innerHTML = '';
            categories.forEach(category => {
                const isActive = currentCategory === category.id;
                const button = document.createElement('button');
                button.className = `whitespace-nowrap px-5 py-2 rounded-full text-sm font-medium transition-all duration-200 ${isActive ? 'bg-orange-500 text-white shadow-md' : 'bg-white text-gray-600 border border-gray-200 hover:bg-gray-50'}`;
                button.innerText = category.name[currentLang];
                button.onclick = () => {
                    currentCategory = category.id;
                    renderCategories();
                    renderMenuItems();
                };
                categoryTabsContainer.appendChild(button);
            });
        }

        // نەخشەی دروستکردنی کاردی ئایتمەکان
        function renderMenuItems() {
            menuContainer.innerHTML = '';
            
            // فلتەرکردنی داتاکان بەپێی جۆر و گەڕان
            const filteredData = menuData.filter(item => {
                const matchCategory = currentCategory === 'all' || item.category === currentCategory;
                const searchLower = searchQuery.toLowerCase();
                const matchSearch = item.name[currentLang].toLowerCase().includes(searchLower) || 
                                    item.description[currentLang].toLowerCase().includes(searchLower);
                return matchCategory && matchSearch;
            });

            if (filteredData.length === 0) {
                menuContainer.innerHTML = `
                    <div class="text-center py-10 text-gray-400">
                        <svg class="w-16 h-16 mx-auto mb-4 text-gray-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9.172 16.172a4 4 0 015.656 0M9 10h.01M15 10h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        <p>${uiTranslations[currentLang].emptySearch}</p>
                    </div>`;
                return;
            }

            filteredData.forEach(item => {
                const card = document.createElement('div');
                card.className = 'flex bg-white rounded-2xl shadow-sm hover:shadow-md transition-shadow duration-300 p-3 gap-4 items-center border border-gray-100 group cursor-pointer';
                
                card.innerHTML = `
                    <div class="relative w-24 h-24 shrink-0 overflow-hidden rounded-xl bg-gray-100">
                        <img src="${item.image}" alt="${item.name[currentLang]}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-500">
                    </div>
                    <div class="flex-1 py-1">
                        <h3 class="text-base font-bold text-gray-800 mb-1">${item.name[currentLang]}</h3>
                        <p class="text-xs text-gray-500 mb-2 line-clamp-2 leading-relaxed">${item.description[currentLang]}</p>
                        <div class="flex justify-between items-center">
                            <span class="text-orange-600 font-bold text-sm bg-orange-50 px-2 py-0.5 rounded-lg" dir="ltr">${item.price} <span class="text-xs font-normal ml-1">${uiTranslations[currentLang].currency}</span></span>
                            
                            <button onclick="addToCart(${item.id})" class="w-8 h-8 rounded-full bg-gray-50 border border-gray-200 flex items-center justify-center text-gray-600 hover:bg-orange-500 hover:text-white hover:border-orange-500 transition-all active:scale-95">
                                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                            </button>
                        </div>
                    </div>
                `;
                menuContainer.appendChild(card);
            });
        }

        // --- نەخشەکانی سەبەتەی داواکارییەکان ---
        
        function addToCart(id) {
            const item = menuData.find(i => i.id === id);
            const existingItem = cart.find(i => i.id === id);
            
            if (existingItem) {
                existingItem.quantity += 1;
            } else {
                cart.push({ ...item, quantity: 1 });
            }
            
            updateCartUI();
            
            const fab = document.getElementById('cartFab');
            fab.classList.remove('hidden');
            fab.classList.add('scale-125');
            setTimeout(() => fab.classList.remove('scale-125'), 200);
        }

        function updateQuantity(id, change) {
            const itemIndex = cart.findIndex(i => i.id === id);
            if (itemIndex > -1) {
                cart[itemIndex].quantity += change;
                if (cart[itemIndex].quantity <= 0) {
                    cart.splice(itemIndex, 1);
                }
            }
            updateCartUI();
            
            if (cart.length === 0) {
                toggleCart();
            }
        }

        function toggleCart() {
            const modal = document.getElementById('cartModal');
            if(cart.length > 0 || !modal.classList.contains('hidden')) {
                modal.classList.toggle('hidden');
            }
        }

        function updateCartUI() {
            const fab = document.getElementById('cartFab');
            const countBadge = document.getElementById('cartCount');
            const container = document.getElementById('cartItemsContainer');
            const totalElement = document.getElementById('cartTotal');
            
            const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
            
            if (totalItems > 0) {
                fab.classList.remove('hidden');
                countBadge.innerText = totalItems;
            } else {
                fab.classList.add('hidden');
            }

            container.innerHTML = '';
            let totalPrice = 0;

            cart.forEach(item => {
                const priceNumber = parseInt(item.price.replace(/,/g, ''));
                totalPrice += priceNumber * item.quantity;
                
                // گونجاندنی پەراوێزەکان بەپێی ئاراستەی زمان
                const paddingClass = currentLang === 'en' ? 'pr-3' : 'pl-3';
                
                container.innerHTML += `
                    <div class="flex justify-between items-center border-b border-gray-100 py-3">
                        <div class="flex-1 ${paddingClass}">
                            <h4 class="font-bold text-gray-800 text-sm md:text-base">${item.name[currentLang]}</h4>
                            <p class="text-orange-500 text-sm mt-0.5 font-medium" dir="ltr">${item.price} ${uiTranslations[currentLang].currency}</p>
                        </div>
                        <div class="flex items-center gap-3 bg-gray-50 rounded-xl p-1.5 border border-gray-100" dir="ltr">
                            <button onclick="updateQuantity(${item.id}, -1)" class="w-8 h-8 bg-white rounded-lg shadow-sm text-gray-700 font-bold flex items-center justify-center hover:text-red-500 transition-colors">-</button>
                            <span class="text-base font-bold w-5 text-center text-gray-800">${item.quantity}</span>
                            <button onclick="updateQuantity(${item.id}, 1)" class="w-8 h-8 bg-white rounded-lg shadow-sm text-gray-700 font-bold flex items-center justify-center hover:text-orange-500 transition-colors">+</button>
                        </div>
                    </div>
                `;
            });

            totalElement.innerText = `${totalPrice.toLocaleString()} ${uiTranslations[currentLang].currency}`;
            totalElement.dir = "ltr";
        }

        // چالاککردنی سیستەمی گەڕان
        searchInput.addEventListener('input', (e) => {
            searchQuery = e.target.value;
            renderMenuItems();
        });

        // کارپێکردنی سەرەتایی (بە زمانی کوردی)
        setLanguage('ku');

    </script>
</body>
</html>
